name: build

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, ubuntu-24.04-arm, macos-15-intel]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout cadiback
      uses: actions/checkout@v4
      with:
        path: cadiback

    - name: Checkout cadical
      uses: actions/checkout@v4
      with:
        repository: meelgroup/cadical
        path: cadical

    - name: Set up ccache
      uses: hendrikmuhs/ccache-action@v1

    - name: Build cadical
      run: |
        cd cadical
        CXX="ccache g++" CXXFLAGS=-fPIC ./configure --competition
        make -j$(nproc)

    - name: Build cadiback
      run: |
        cd cadiback
        CXX="ccache g++" CXXFLAGS=-fPIC ./configure --release
        make -j$(nproc)

    - name: Determine artifact suffix
      id: suffix
      run: |
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        echo "suffix=${OS}-${ARCH}" >> "$GITHUB_OUTPUT"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cadiback-${{ steps.suffix.outputs.suffix }}
        path: |
          cadiback/libcadiback.a
          cadiback/libcadiback.so
          cadiback/cadiback
        if-no-files-found: error
